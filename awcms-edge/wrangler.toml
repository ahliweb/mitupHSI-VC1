name = "awcms-personalfinance"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[env.production]
name = "awcms-personalfinance-prod"
routes = [
  { pattern = "personalfinance.ahlikoding.com/api/*", zone_name = "ahlikoding.com" }
]

[[env.production.r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "awcms-personalfinance"

[env.preview]
name = "awcms-personalfinance-preview"

[[env.preview.r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "awcms-personalfinance"

[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "awcms-personalfinance"

[vars]
ENVIRONMENT = "development"

[env.production.vars]
ENVIRONMENT = "production"

# Secrets (set via wrangler secret put):
# SUPABASE_URL
# SUPABASE_SERVICE_KEY
