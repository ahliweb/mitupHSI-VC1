name: Docs Link Check

on:
  push:
    paths:
      - '**.md'
      - '.mlc_config.json'
  pull_request:
    paths:
      - '**.md'
      - '.mlc_config.json'
  schedule:
    - cron: '0 0 * * 0'

jobs:
  link-check:
    name: Check Documentation Links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install markdown-link-check
        run: npm install -g markdown-link-check

      - name: Check markdown links
        run: |
          markdown-link-check --config .mlc_config.json README.md AGENTS.md DOCS_INDEX.md CHANGELOG.md || true

      - name: Check local markdown links
        run: |
          node scripts/check_markdown_local_links.mjs || true
